version: '3.8'

services:
  db:
    image: postgres:16
    container_name: bloodflow_db
    environment:
      POSTGRES_USER: bloodflow
      POSTGRES_PASSWORD: bloodflow123
      POSTGRES_DB: bloodflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: